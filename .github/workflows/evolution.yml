name: Auto Evolution

on:
  schedule:
    # 每小时运行一次
    # 格式: 分 时 日 月 周
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: evolution-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ═══════════════════════════════════════════════════════════
      # 基础设置
      # ═══════════════════════════════════════════════════════════
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Install dependencies
        run: uv sync

      # ═══════════════════════════════════════════════════════════
      # 🏥 系统健康检查
      # ═══════════════════════════════════════════════════════════
      - name: System Health Check
        continue-on-error: true
        run: |
          echo "🏥 启动系统健康检查..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from evolution.health_check import get_health_report
          print(get_health_report())
          "

      # ═══════════════════════════════════════════════════════════
      # 🧬 自主进化系统 - Lv26-Lv30
      # ═══════════════════════════════════════════════════════════
      - name: Autonomous Evolution
        continue-on-error: true
        run: |
          echo "🧬 启动自主进化系统..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🧬 自主进化系统 v2.0')
          print('='*60)
          
          # Lv26: 自我观察
          try:
              from evolution.self_observer import SelfObserver
              observer = SelfObserver('.')
              gaps = observer.identify_capability_gaps()
              print(f'[自主进化] Lv26 发现{len(gaps)}个能力缺口')
          except Exception as e:
              print(f'[自主进化] Lv26 自我观察失败: {e}')
          
          # Lv27: 自主设计
          try:
              from evolution.self_designer import generate_new_feature_design
              if gaps:
                  designs = generate_new_feature_design(gaps)
                  print(f'[自主进化] Lv27 设计{len(designs)}个新功能')
          except Exception as e:
              print(f'[自主进化] Lv27 自主设计失败: {e}')
          
          # Lv28: 自主编码
          try:
              from evolution.self_coder import generate_feature_code
              if gaps:
                  code_results = generate_feature_code(gaps)
                  print(f'[自主进化] Lv28 生成{len(code_results)}个模块')
          except Exception as e:
              print(f'[自主进化] Lv28 自主编码失败: {e}')
          
          # Lv29: 自主测试
          try:
              from evolution.self_tester import run_auto_tests
              test_results = run_auto_tests('.')
              print(f'[自主进化] Lv29 测试完成: {len(test_results)}个')
          except Exception as e:
              print(f'[自主进化] Lv29 自主测试失败: {e}')
          
          # Lv30: 自主部署决策
          try:
              from evolution.self_deployer import make_deploy_decision
              decision = make_deploy_decision('.')
              print(f'[自主进化] Lv30 部署决策: {decision}')
          except Exception as e:
              print(f'[自主进化] Lv30 自主部署失败: {e}')
          
          print('='*60)
          print('🧬 自主进化完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🚨 异常干预系统 - Lv33-Lv35
      # ═══════════════════════════════════════════════════════════
      - name: Exception Intervention
        continue-on-error: true
        run: |
          echo "🚨 启动异常干预系统..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🚨 异常干预系统 v2.0')
          print('='*60)
          
          # Lv33: 异常监控
          try:
              from evolution.exception_monitor import get_exception_monitor_report
              report = get_exception_monitor_report()
              print(report)
              print('[异常干预] Lv33 异常监控完成')
          except Exception as e:
              print(f'[异常干预] Lv33 异常监控失败: {e}')
          
          # Lv34: 异常修复
          try:
              from evolution.exception_healer import get_heal_report
              heal_report = get_heal_report()
              print(heal_report)
              print('[异常干预] Lv34 异常修复完成')
          except Exception as e:
              print(f'[异常干预] Lv34 异常修复失败: {e}')
          
          # Lv35: 异常预测
          try:
              from evolution.exception_predictor import get_exception_prediction
              prediction = get_exception_prediction()
              print(prediction)
              print('[异常干预] Lv35 异常预测完成')
          except Exception as e:
              print(f'[异常干预] Lv35 异常预测失败: {e}')
          
          print('='*60)
          print('🚨 异常干预完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🏗️ Astro 构建健康检查 — 跨仓库部署监控
      # ═══════════════════════════════════════════════════════════
      - name: Astro Build Health Check
        continue-on-error: true
        env:
          GH_MEMORY_TOKEN: ${{ secrets.GH_MEMORY_TOKEN }}
          ASTRO_REPO_OWNER: ${{ secrets.ASTRO_REPO_OWNER }}
          ASTRO_REPO_NAME: ${{ secrets.ASTRO_REPO_NAME }}
        run: |
          echo "🏗️ 启动 Astro 构建健康检查..."
          uv run python -c "
          import sys
          import os
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🏗️ Astro 构建健康监控系统 v1.0')
          print('='*60)
          
          try:
              from evolution.build_health_monitor import get_build_health_report
              
              report = get_build_health_report(
                  github_token=os.environ.get('GH_MEMORY_TOKEN') or os.environ.get('GITHUB_TOKEN'),
                  github_owner=os.environ.get('ASTRO_REPO_OWNER', 'garcci'),
                  github_repo=os.environ.get('ASTRO_REPO_NAME', 'Astro'),
                  cf_api_token=os.environ.get('CF_API_TOKEN'),
                  cf_account_id=os.environ.get('CF_ACCOUNT_ID'),
              )
              print(report)
              
              # 如果构建不健康，记录到异常知识库
              if '❌ 异常' in report:
                  from evolution.exception_monitor import ExceptionMonitor
                  monitor = ExceptionMonitor('.')
                  monitor.record_exception(
                      'BuildHealthMonitor',
                      'Astro 博客构建或部署异常',
                      report,
                      context='build_health_check',
                      module='build_health_monitor'
                  )
                  monitor._save_knowledge_base()
                  print('[构建监控] ⚠️ 已记录构建异常到知识库')
                  sys.exit(1)  # 标记 workflow 为失败，触发告警
              else:
                  print('[构建监控] ✅ Astro 博客构建健康')
          except Exception as e:
              print(f'[构建监控] 失败: {e}')
              import traceback
              traceback.print_exc()
          
          print('='*60)
          print('🏗️ 构建健康检查完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 📦 仓库精简 - Lv36-Lv38
      # ═══════════════════════════════════════════════════════════
      - name: Repo Cleanup
        continue-on-error: true
        run: |
          echo "📦 启动仓库精简系统..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('📦 仓库精简系统 v2.0')
          print('='*60)
          
          # Lv36: 体积监控
          try:
              from evolution.repo_size_monitor import get_repo_size_insight
              size_insight = get_repo_size_insight()
              print(size_insight)
              print('[仓库精简] Lv36 体积监控完成')
          except Exception as e:
              print(f'[仓库精简] Lv36 体积监控失败: {e}')
          
          # Lv37: 数据归档
          try:
              from evolution.data_archiver import archive_old_data
              archive_result = archive_old_data('.')
              print(archive_result)
              print('[仓库精简] Lv37 数据归档完成')
          except Exception as e:
              print(f'[仓库精简] Lv37 数据归档失败: {e}')
          
          # Lv38: 冗余清理
          try:
              from evolution.cleanup_manager import cleanup_repo
              cleanup_result = cleanup_repo('.')
              print(cleanup_result)
              print('[仓库精简] Lv38 冗余清理完成')
          except Exception as e:
              print(f'[仓库精简] Lv38 冗余清理失败: {e}')
          
          print('='*60)
          print('📦 仓库精简完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🎯 Prompt进化 - Lv39-Lv41
      # ═══════════════════════════════════════════════════════════
      - name: Prompt Evolution
        continue-on-error: true
        run: |
          echo "🎯 启动Prompt进化..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🎯 Prompt进化系统 v2.0')
          print('='*60)
          
          # Lv39: Prompt效果追踪
          try:
              from evolution.prompt_tracker import get_prompt_effectiveness_report
              report = get_prompt_effectiveness_report()
              print(report)
              print('[Prompt进化] Lv39 效果追踪完成')
          except Exception as e:
              print(f'[Prompt进化] Lv39 效果追踪失败: {e}')
          
          # Lv40: Prompt自动优化
          try:
              from evolution.prompt_optimizer import get_prompt_optimization_report
              report = get_prompt_optimization_report()
              print(report)
              print('[Prompt进化] Lv40 自动优化完成')
          except Exception as e:
              print(f'[Prompt进化] Lv40 自动优化失败: {e}')
          
          # Lv41: Prompt进化引擎
          try:
              from evolution.prompt_evolution import get_prompt_evolution_report
              report = get_prompt_evolution_report()
              print(report)
              print('[Prompt进化] Lv41 进化引擎完成')
          except Exception as e:
              print(f'[Prompt进化] Lv41 进化引擎失败: {e}')
          
          print('='*60)
          print('🎯 Prompt进化完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🧬 系统自动优化 - Lv61
      # ═══════════════════════════════════════════════════════════
      - name: Auto Optimization
        continue-on-error: true
        run: |
          echo "🧬 启动系统自动优化..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🧬 系统自动优化器 v1.0')
          print('='*60)
          
          try:
              from evolution.auto_optimizer import run_auto_optimization
              report = run_auto_optimization('.')
              print(report)
              print('[系统优化] Lv61 完成')
          except Exception as e:
              print(f'[系统优化] Lv61 失败: {e}')
          
          print('='*60)
          print('🧬 系统优化完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🔍 输出质量验证 - Lv45 捕获静默错误
      # ═══════════════════════════════════════════════════════════
      - name: Output Quality Validation
        continue-on-error: true
        env:
          GH_MEMORY_TOKEN: ${{ secrets.GH_MEMORY_TOKEN }}
          ASTRO_REPO_OWNER: ${{ secrets.ASTRO_REPO_OWNER }}
          ASTRO_REPO_NAME: ${{ secrets.ASTRO_REPO_NAME }}
        run: |
          echo "🔍 启动输出质量验证..."
          uv run python -c "
          import sys
          import os
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🔍 输出质量验证系统 v1.0')
          print('='*60)
          
          try:
              from evolution.output_quality_validator import validate_output_quality
              
              token = os.environ.get('GH_MEMORY_TOKEN')
              owner = os.environ.get('ASTRO_REPO_OWNER', 'garcci')
              repo = os.environ.get('ASTRO_REPO_NAME', 'Astro')
              
              report = validate_output_quality(owner, repo, token)
              print(report)
              print('[质量验证] Lv45 验证完成')
          except Exception as e:
              print(f'[质量验证] Lv45 失败: {e}')
          
          print('='*60)
          print('🔍 输出质量验证完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 📊 免费资源智能调度 - Lv46 榨干每一滴免费额度
      # ═══════════════════════════════════════════════════════════
      - name: Free Resource Scheduler
        continue-on-error: true
        run: |
          echo "📊 启动免费资源智能调度..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('📊 免费资源智能调度器 v1.0')
          print('='*60)
          
          try:
              from evolution.free_resource_scheduler import show_today_strategy
              show_today_strategy()
              print('[额度调度] Lv46 策略生成完成')
          except Exception as e:
              print(f'[额度调度] Lv46 失败: {e}')
          
          print('='*60)
          print('📊 免费资源调度完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🔧 自动校准系统 - Lv47 根据质量反馈调整参数
      # ═══════════════════════════════════════════════════════════
      - name: Auto Calibration
        continue-on-error: true
        env:
          GH_MEMORY_TOKEN: ${{ secrets.GH_MEMORY_TOKEN }}
          ASTRO_REPO_OWNER: ${{ secrets.ASTRO_REPO_OWNER }}
          ASTRO_REPO_NAME: ${{ secrets.ASTRO_REPO_NAME }}
        run: |
          echo "🔧 启动自动校准系统..."
          uv run python -c "
          import sys
          import os
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🔧 自动校准系统 v1.0')
          print('='*60)
          
          try:
              from evolution.auto_calibration import auto_calibrate
              
              token = os.environ.get('GH_MEMORY_TOKEN')
              owner = os.environ.get('ASTRO_REPO_OWNER', 'garcci')
              repo = os.environ.get('ASTRO_REPO_NAME', 'Astro')
              
              auto_calibrate(owner, repo, token)
              print('[自动校准] Lv47 校准完成')
          except Exception as e:
              print(f'[自动校准] Lv47 失败: {e}')
          
          print('='*60)
          print('🔧 自动校准完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🩹 AI代码修复器 - Lv48 自动诊断和修复代码
      # ═══════════════════════════════════════════════════════════
      - name: AI Code Healer
        continue-on-error: true
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          echo "🩹 启动AI代码修复器..."
          uv run python -c "
          import sys
          import os
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🩹 AI代码修复器 v1.0')
          print('='*60)
          
          try:
              from evolution.ai_code_healer import heal_codebase
              
              # 扫描trendradar目录
              report = heal_codebase('trendradar', use_ai=False)
              print(report)
              print('[代码修复] Lv48 扫描完成')
          except Exception as e:
              print(f'[代码修复] Lv48 失败: {e}')
          
          print('='*60)
          print('🩹 AI代码修复完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🌐 多语言自动翻译 - Lv49 扩大全球受众
      # ═══════════════════════════════════════════════════════════
      - name: Multilingual Translation
        continue-on-error: true
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          echo "🌐 启动多语言翻译系统..."
          uv run python -c "
          import sys
          import os
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🌐 多语言翻译系统 v1.0')
          print('='*60)
          
          try:
              from evolution.multilingual_translator import batch_translate
              
              # 翻译最近7天的文章
              translated = batch_translate('src/content/posts', days=7)
              if translated:
                  print(f'[翻译] 成功翻译 {len(translated)} 篇文章')
                  for t in translated:
                      print(f'  ✓ {t}')
              else:
                  print('[翻译] 暂无需要翻译的新文章')
              
              print('[翻译] Lv49 翻译完成')
          except Exception as e:
              print(f'[翻译] Lv49 失败: {e}')
          
          print('='*60)
          print('🌐 多语言翻译完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 📊 内容健康度仪表盘 - Lv50 系统体检报告
      # ═══════════════════════════════════════════════════════════
      - name: Health Dashboard
        continue-on-error: true
        env:
          GH_MEMORY_TOKEN: ${{ secrets.GH_MEMORY_TOKEN }}
          ASTRO_REPO_OWNER: ${{ secrets.ASTRO_REPO_OWNER }}
          ASTRO_REPO_NAME: ${{ secrets.ASTRO_REPO_NAME }}
        run: |
          echo "📊 生成内容健康度仪表盘..."
          uv run python -c "
          import sys
          import os
          sys.path.insert(0, '.')
          
          print('='*60)
          print('📊 内容健康度仪表盘 v1.0')
          print('='*60)
          
          try:
              from evolution.health_dashboard import save_dashboard
              
              token = os.environ.get('GH_MEMORY_TOKEN')
              owner = os.environ.get('ASTRO_REPO_OWNER', 'garcci')
              repo = os.environ.get('ASTRO_REPO_NAME', 'Astro')
              
              save_dashboard(owner, repo, token)
              print('[仪表盘] Lv50 报告生成完成')
          except Exception as e:
              print(f'[仪表盘] Lv50 失败: {e}')
          
          print('='*60)
          print('📊 仪表盘生成完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🧬 系统自动优化 - Lv61
      # ═══════════════════════════════════════════════════════════
      - name: Auto Optimization
        continue-on-error: true
        run: |
          echo "🧬 启动系统自动优化..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🧬 系统自动优化器 v1.0')
          print('='*60)
          
          try:
              from evolution.auto_optimizer import run_auto_optimization
              report = run_auto_optimization('.')
              print(report)
              print('[系统优化] Lv61 完成')
          except Exception as e:
              print(f'[系统优化] Lv61 失败: {e}')
          
          print('='*60)
          print('🧬 系统优化完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🤖 自动代码迭代 - Lv28升级
      # ═══════════════════════════════════════════════════════════
      - name: Auto Code Evolution
        continue-on-error: true
        env:
          GH_MEMORY_TOKEN: ${{ secrets.GH_MEMORY_TOKEN }}
          ASTRO_REPO_OWNER: ${{ secrets.ASTRO_REPO_OWNER }}
          ASTRO_REPO_NAME: ${{ secrets.ASTRO_REPO_NAME }}
        run: |
          echo "🤖 启动自动代码迭代系统..."
          git config --global user.email "trendradar-auto@github.com"
          git config --global user.name "TrendRadar Auto Evolution"
          uv run python -c "
          import os
          import sys
          sys.path.insert(0, '.')
          from evolution.code_evolution import run_auto_evolution
          
          token = os.environ.get('GH_MEMORY_TOKEN')
          owner = os.environ.get('ASTRO_REPO_OWNER', 'garcci')
          repo = os.environ.get('ASTRO_REPO_NAME', 'Astro')
          
          if token:
              result = run_auto_evolution(owner, repo, token)
              print(f'自动迭代结果: {result}')
          else:
              print('跳过自动迭代：未配置 GH_MEMORY_TOKEN')
          "

      # ═══════════════════════════════════════════════════════════
      # 🛡️ 退化检测与安全护栏 - Lv73
      # ═══════════════════════════════════════════════════════════
      - name: Regression Guard
        continue-on-error: false
        env:
          GH_MEMORY_TOKEN: ${{ secrets.GH_MEMORY_TOKEN }}
          ASTRO_REPO_OWNER: ${{ secrets.ASTRO_REPO_OWNER }}
          ASTRO_REPO_NAME: ${{ secrets.ASTRO_REPO_NAME }}
        run: |
          echo "🛡️ Lv73: 启动退化检测与安全护栏..."
          uv run python evolution/regression_guard.py --check --repo-path .
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            echo "⚠️ 检测到退化，已执行干预措施（详见日志）"
            echo "如需恢复自动进化，请手动删除 evolution/.pause_evolution 文件"
          fi
          exit 0

      - name: Auto Healing
        continue-on-error: true
        timeout-minutes: 5
        run: |
          echo "🩹 Lv72: 启动自动错误修复系统..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from evolution.auto_healing import AutoHealingSystem, get_system_health
          
          # 扫描系统健康状态
          health = get_system_health('.', days=7)
          print(f'系统健康评分: {health.get(\"health_score\", \"N/A\")}/100')
          
          # 尝试修复近期异常
          healer = AutoHealingSystem('.')
          if health.get('recent_errors'):
              for error in health['recent_errors'][:5]:
                  result = healer.handle_error(error.get('message', ''), error)
                  status = '✅ 已修复' if result.get('auto_fixed') else '⚠️ 需人工处理'
                  print(f'{status}: {error.get(\"category\", \"unknown\")} — {error.get(\"message\", \"\")[:60]}')
          else:
              print('近期无异常，系统健康')
          "

      # ═══════════════════════════════════════════════════════════
      # 🎛️ 进化步骤动态编排 - Lv78 根据数据动态调整步骤
      # ═══════════════════════════════════════════════════════════
      - name: Dynamic Scheduler
        continue-on-error: true
        run: |
          echo "🎛️ Lv78: 生成进化步骤动态编排报告..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from evolution.dynamic_scheduler import generate_schedule_report
          print(generate_schedule_report())
          "

      # ═══════════════════════════════════════════════════════════
      # 📊 进化效果仪表盘 - Lv79 数据驱动决策
      # ═══════════════════════════════════════════════════════════
      - name: Effect Dashboard
        continue-on-error: true
        run: |
          echo "📊 Lv79: 生成进化效果仪表盘..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from evolution.effect_dashboard import write_dashboard
          print(write_dashboard())
          "
          if [ -f evolution/dashboard.md ]; then
            echo ""
            echo "--- 仪表盘摘要 ---"
            head -30 evolution/dashboard.md
          fi

      - name: End-to-End Tests
        continue-on-error: true
        timeout-minutes: 2
        run: |
          echo "🔬 运行端到端功能测试..."
          uv run python evolution/e2e_test_runner.py
          echo ""

      - name: System Final Check
        continue-on-error: true
        timeout-minutes: 3
        run: |
          echo "🔬 运行系统最终健康检查 (Round 5)..."
          uv run python evolution/system_final_check.py
          echo ""
          echo "✅ 五轮调优循环完成：Prompt→数据流→Workflow容错→代码扫描→架构验证"
