name: Get Hot News

on:
  schedule:
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # ⚠️ 试用版说明 / Trial Mode
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #
    # 🔄 运行机制 / How it works:
    #    - 每个周期为 7 天，届时自动停止
    #    - 运行 "Check In" 会重置周期（重新开始 7 天倒计时，而非累加）
    #    - Each cycle is 7 days, then auto-stops
    #    - "Check In" resets the cycle (restarts 7-day countdown, not cumulative)
    #
    # 💡 设计初衷 / Why this design:
    #    如果 7 天都忘了签到，或许这些资讯对你来说并非刚需
    #    适时的暂停，能帮你从信息流中抽离，给大脑留出喘息的空间
    #    If you forget for 7 days, maybe you don't really need it
    #    A timely pause helps you detach from the stream and gives your mind space
    #
    # 🙏 珍惜资源 / Respect shared resources:
    #    GitHub Actions 是平台提供的公共资源，每次运行都会消耗算力
    #    签到机制确保资源分配给真正需要的用户，感谢你的理解与配合
    #    GitHub Actions is a shared public resource provided by the platform
    #    Check-in ensures resources go to those who truly need it — thank you
    #
    # 🚀 长期使用请部署 Docker 版本 / For long-term use, deploy Docker version
    #
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #
    # 📝 修改运行时间：
    #   第一个数字（0-59）= 每小时第几分钟
    #   第二个数字 = 小时（*表示每小时，*/6表示每6小时）
    #
    # 当前配置: 每6小时运行一次 (00:33, 06:33, 12:33, 18:33 UTC)
    # 对应北京时间: 08:33, 14:33, 20:33, 02:33
    #
    - cron: "33 */6 * * *"

  workflow_dispatch:

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write      # 允许自动代码迭代推送变更
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Check Expiration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WORKFLOW_FILE="crawler.yml"
          API_URL="repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs"

          TOTAL=$(gh api "$API_URL" --jq '.total_count')
          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "No previous runs found, skipping expiration check"
            exit 0
          fi

          LAST_PAGE=$(( (TOTAL + 99) / 100 ))
          FIRST_RUN_DATE=$(gh api "$API_URL?per_page=100&page=$LAST_PAGE" --jq '.workflow_runs[-1].created_at')

          if [ -n "$FIRST_RUN_DATE" ]; then
            CURRENT_TIMESTAMP=$(date +%s)
            FIRST_RUN_TIMESTAMP=$(date -d "$FIRST_RUN_DATE" +%s)
            DIFF_SECONDS=$((CURRENT_TIMESTAMP - FIRST_RUN_TIMESTAMP))
            LIMIT_SECONDS=604800

            if [ $DIFF_SECONDS -gt $LIMIT_SECONDS ]; then
              echo "⚠️ 试用期已结束，请运行 'Check In' 签到续期"
              echo "⚠️ Trial expired. Run 'Check In' to renew."
              gh workflow disable "$WORKFLOW_FILE"
              exit 1
            else
              DAYS_LEFT=$(( (LIMIT_SECONDS - DIFF_SECONDS) / 86400 ))
              echo "✅ 试用期剩余 ${DAYS_LEFT} 天，到期前请运行 'Check In' 签到续期"
              echo "✅ Trial: ${DAYS_LEFT} days left. Run 'Check In' before expiry to renew."
            fi
          fi


      # --------------------------------------------------------------------------------
      # 🚦 TRAFFIC CONTROL / 流量控制
      # --------------------------------------------------------------------------------
      # EN: Generates a random delay between 1 and 300 seconds (5 minutes).
      #     Critical for load balancing.
      #
      # CN: 生成 1 到 300 秒（5分钟）之间的随机延迟。
      #     这对负载均衡至关重要。
      # - name: Random Delay (Traffic Control)
      #   if: success()
      #   run: |
      #     echo "🎲 Traffic Control: Generating random delay..."
      #     DELAY=$(( ( RANDOM % 300 )  + 1 ))
      #     echo "⏸️  Sleeping for ${DELAY} seconds to spread the load..."
      #     sleep ${DELAY}s
      #     echo "▶️  Delay finished. Starting crawler..."

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: success()
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        if: success()
        run: uv sync --frozen --no-dev

      - name: Verify required files
        if: success()
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run crawler
        if: success()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # 通用Webhook配置
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          # AI 配置（ai_analysis 和 ai_translation 共享模型配置）
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_ANALYSIS_ENABLED }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          # 免费AI Provider配置
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          # D1数据库配置
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          # Memory System Configuration
          GH_MEMORY_TOKEN: ${{ secrets.GH_MEMORY_TOKEN }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          # 远程存储配置
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          # GitHub 存储配置（直接推送到 Astro 博客）
          ASTRO_GITHUB_TOKEN: ${{ secrets.ASTRO_GITHUB_TOKEN }}
          ASTRO_REPO_OWNER: ${{ secrets.ASTRO_REPO_OWNER }}
          ASTRO_REPO_NAME: ${{ secrets.ASTRO_REPO_NAME }}
          ASTRO_BRANCH: ${{ secrets.ASTRO_BRANCH }}
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar

      # ═══════════════════════════════════════════════════════════
      # 📊 自动优化分析 - 基于历史数据驱动进化
      # ═══════════════════════════════════════════════════════════
      - name: Auto Optimization Report
        if: success()
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          echo "🧬 运行自动优化分析..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from evolution.auto_optimizer import run_auto_optimization
          report = run_auto_optimization('.')
          print(report)
          "

      # ═══════════════════════════════════════════════════════════
      # 🧬 自主进化系统 - Lv26-Lv30 自我成长
      # ═══════════════════════════════════════════════════════════
      - name: Autonomous Evolution
        if: success()
        run: |
          echo "🧬 启动自主进化系统..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🧬 自主进化系统 v1.0')
          print('='*60)
          
          # Lv26: 自我观察
          try:
              from evolution.self_observer import get_self_diagnosis
              diagnosis = get_self_diagnosis()
              print(diagnosis)
              print('[自主进化] Lv26 自我观察完成')
          except Exception as e:
              print(f'[自主进化] Lv26 自我观察失败: {e}')
          
          # Lv27: 自主设计
          try:
              from evolution.self_designer import run_self_design
              designs = run_self_design()
              if designs:
                  print(f'[自主进化] Lv27 设计了 {len(designs)} 个新功能')
              else:
                  print('[自主进化] Lv27 暂无需要设计的新功能')
          except Exception as e:
              print(f'[自主进化] Lv27 自主设计失败: {e}')
          
          # Lv28: 自主编码
          try:
              from evolution.self_coder import run_self_coding
              implementations = run_self_coding()
              if implementations:
                  print(f'[自主进化] Lv28 实现了 {len(implementations)} 个新功能')
              else:
                  print('[自主进化] Lv28 暂无需要实现的新功能')
          except Exception as e:
              print(f'[自主进化] Lv28 自主编码失败: {e}')
          
          # Lv29: 自主测试
          try:
              from evolution.self_tester import run_self_testing
              test_results = run_self_testing()
              if test_results:
                  from evolution.self_tester import SelfTester
                  tester = SelfTester()
                  print(tester.generate_test_report(test_results))
              else:
                  print('[自主进化] Lv29 暂无需要测试的新功能')
          except Exception as e:
              print(f'[自主进化] Lv29 自主测试失败: {e}')
          
          # Lv30: 自主部署
          try:
              from evolution.self_deployer import run_self_deploy
              deploy_decisions = run_self_deploy()
              if deploy_decisions:
                  from evolution.self_deployer import SelfDeployer
                  deployer = SelfDeployer()
                  print(deployer.generate_deploy_report(deploy_decisions))
              else:
                  print('[自主进化] Lv30 暂无需要部署的新功能')
          except Exception as e:
              print(f'[自主进化] Lv30 自主部署失败: {e}')
          
          print('='*60)
          print('🧬 自主进化完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🔮 预测性维护 - 提前发现问题
      # ═══════════════════════════════════════════════════════════
      - name: Predictive Maintenance
        if: success()
        run: |
          echo "🔮 启动预测性维护..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from evolution.predictive_maintenance import run_predictive_maintenance
          report = run_predictive_maintenance('.')
          print(report)
          "

      # ═══════════════════════════════════════════════════════════
      # 🚨 异常干预系统 - Lv33-Lv35 实时修复
      # ═══════════════════════════════════════════════════════════
      - name: Exception Intervention
        if: success()
        run: |
          echo "🚨 启动异常干预系统..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🚨 异常干预系统 v1.0')
          print('='*60)
          
          # Lv33: 异常监控
          try:
              from evolution.exception_monitor import get_exception_monitor_report
              report = get_exception_monitor_report()
              print(report)
              print('[异常干预] Lv33 异常监控完成')
          except Exception as e:
              print(f'[异常干预] Lv33 异常监控失败: {e}')
          
          # Lv34: 异常修复
          try:
              from evolution.exception_healer import run_exception_healing
              results = run_exception_healing('.', min_count=2)
              if results:
                  from evolution.exception_healer import ExceptionHealer
                  healer = ExceptionHealer()
                  print(healer.generate_heal_report(results))
              else:
                  print('[异常干预] Lv34 暂无需要修复的异常')
          except Exception as e:
              print(f'[异常干预] Lv34 异常修复失败: {e}')
          
          # Lv35: 异常预测
          try:
              from evolution.exception_predictor import get_exception_prediction
              prediction = get_exception_prediction()
              print(prediction)
              print('[异常干预] Lv35 异常预测完成')
          except Exception as e:
              print(f'[异常干预] Lv35 异常预测失败: {e}')
          
          print('='*60)
          print('🚨 异常干预完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 📦 仓库精简 - Lv36-Lv38 体积监控/归档/清理
      # ═══════════════════════════════════════════════════════════
      - name: Repo Cleanup
        if: success()
        run: |
          echo "📦 启动仓库精简..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('📦 仓库精简系统 v1.0')
          print('='*60)
          
          # Lv36: 体积监控
          try:
              from evolution.repo_size_monitor import get_repo_size_report
              report = get_repo_size_report()
              print(f'[仓库精简] 当前仓库大小: {report[\"total_size_mb\"]} MB')
              print(f'[仓库精简] 状态: {report[\"status_text\"]}')
          except Exception as e:
              print(f'[仓库精简] Lv36 体积监控失败: {e}')
          
          # Lv37: 数据归档
          try:
              from evolution.data_archiver import run_auto_archive
              results = run_auto_archive('.')
              if results:
                  from evolution.data_archiver import DataArchiver
                  archiver = DataArchiver()
                  print(archiver.generate_archive_report(results))
              else:
                  print('[仓库精简] Lv37 无需归档')
          except Exception as e:
              print(f'[仓库精简] Lv37 数据归档失败: {e}')
          
          # Lv38: 冗余清理
          try:
              from evolution.cleanup_manager import run_cleanup
              results = run_cleanup('.')
              if results:
                  from evolution.cleanup_manager import CleanupManager
                  manager = CleanupManager()
                  print(manager.generate_cleanup_report(results))
              else:
                  print('[仓库精简] Lv38 无需清理')
          except Exception as e:
              print(f'[仓库精简] Lv38 冗余清理失败: {e}')
          
          print('='*60)
          print('📦 仓库精简完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🎯 Prompt进化 - Lv39-Lv41 自适应Prompt优化
      # ═══════════════════════════════════════════════════════════
      - name: Prompt Evolution
        if: success()
        run: |
          echo "🎯 启动Prompt进化..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🎯 Prompt进化系统 v1.0')
          print('='*60)
          
          # Lv39: Prompt效果追踪
          try:
              from evolution.prompt_tracker import get_prompt_effectiveness_report
              report = get_prompt_effectiveness_report()
              print(report)
              print('[Prompt进化] Lv39 效果追踪完成')
          except Exception as e:
              print(f'[Prompt进化] Lv39 效果追踪失败: {e}')
          
          # Lv40: Prompt自动优化
          try:
              from evolution.prompt_optimizer import get_prompt_optimization_report
              report = get_prompt_optimization_report()
              print(report)
              print('[Prompt进化] Lv40 自动优化完成')
          except Exception as e:
              print(f'[Prompt进化] Lv40 自动优化失败: {e}')
          
          # Lv41: Prompt进化引擎
          try:
              from evolution.prompt_evolution import get_prompt_evolution_report
              report = get_prompt_evolution_report()
              print(report)
              print('[Prompt进化] Lv41 进化引擎完成')
          except Exception as e:
              print(f'[Prompt进化] Lv41 进化引擎失败: {e}')
          
          print('='*60)
          print('🎯 Prompt进化完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🔭 跨项目学习 - Lv42 从GitHub/HN学习技术趋势
      # ═══════════════════════════════════════════════════════════
      - name: Cross-Project Learning
        if: success()
        run: |
          echo "🔭 启动跨项目学习..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🔭 跨项目学习系统 v1.0')
          print('='*60)
          
          try:
              from evolution.cross_project_learner import CrossProjectLearner
              learner = CrossProjectLearner('.')
              trends = learner.learn()
              
              analysis = trends.get('analysis', {})
              print(f'📊 GitHub热门项目: {analysis.get(\"total_projects\", 0)}个')
              print(f'📊 HN热门话题: {analysis.get(\"total_hn_topics\", 0)}个')
              
              insights = analysis.get('insights', [])
              for i, insight in enumerate(insights[:5], 1):
                  print(f'  {i}. {insight}')
              
              print('[跨项目学习] Lv42 学习完成')
          except Exception as e:
              print(f'[跨项目学习] Lv42 失败: {e}')
          
          print('='*60)
          print('🔭 跨项目学习完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 📤 内容分发准备 - Lv43 生成社交媒体内容
      # ═══════════════════════════════════════════════════════════
      - name: Content Distribution
        if: success()
        run: |
          echo "📤 准备内容分发..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('📤 内容分发系统 v1.0')
          print('='*60)
          
          try:
              from evolution.content_distributor import ContentDistributor
              distributor = ContentDistributor('.')
              
              # 生成示例分发内容
              test_package = distributor.generate_distribution_package(
                  title='今日科技热点速览',
                  summary='AI技术持续突破，开源社区活跃',
                  tags=['AI', '科技', '开源'],
                  article_url='https://example.com/article'
              )
              
              platforms = test_package.get('platforms', {})
              for platform, content in platforms.items():
                  print(f'  📱 {platform}: OK')
              
              print(f'[内容分发] Lv43 生成{len(platforms)}个平台内容')
          except Exception as e:
              print(f'[内容分发] Lv43 失败: {e}')
          
          print('='*60)
          print('📤 内容分发准备完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🤖 深度自主编码 - Lv44 使用AI生成完整代码
      # ═══════════════════════════════════════════════════════════
      - name: Deep Self Coding
        if: success()
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "🤖 启动深度自主编码..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          
          print('='*60)
          print('🤖 深度自主编码系统 v1.0')
          print('='*60)
          
          try:
              from evolution.deep_self_coder import generate_simple_module
              
              # 测试生成一个简单模块
              result = generate_simple_module(
                  name='DataVisualizer',
                  purpose='可视化数据分析结果',
                  methods=['load data', 'create chart', 'export report']
              )
              
              print(f'  模块: {result.get(\"module_name\", \"unknown\")}')
              print(f'  有效: {result.get(\"valid\", False)}')
              print(f'  Fallback: {result.get(\"fallback\", False)}')
              print(f'  代码长度: {len(result.get(\"code\", \"\"))}字符')
              
              print('[深度编码] Lv44 测试完成')
          except Exception as e:
              print(f'[深度编码] Lv44 失败: {e}')
          
          print('='*60)
          print('🤖 深度自主编码完成')
          print('='*60)
          "

      # ═══════════════════════════════════════════════════════════
      # 🔄 智能回滚 - 验证变更效果
      # ═══════════════════════════════════════════════════════════
      - name: Smart Rollback
        if: success()
        run: |
          echo "🔄 运行智能回滚检查..."
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from evolution.smart_rollback import verify_and_rollback
          report = verify_and_rollback('.')
          print(report)
          "

      # ═══════════════════════════════════════════════════════════
      # 🤖 自动代码迭代 - 系统自我改进
      # ═══════════════════════════════════════════════════════════
      - name: Auto Code Evolution
        if: success()
        env:
          GH_MEMORY_TOKEN: ${{ secrets.GH_MEMORY_TOKEN }}
          ASTRO_REPO_OWNER: ${{ secrets.ASTRO_REPO_OWNER }}
          ASTRO_REPO_NAME: ${{ secrets.ASTRO_REPO_NAME }}
        run: |
          echo "🤖 启动自动代码迭代系统..."
          # 配置Git身份（自动迭代需要提交代码）
          git config --global user.email "trendradar-auto@github.com"
          git config --global user.name "TrendRadar Auto Evolution"
          uv run python -c "
          import os
          import sys
          sys.path.insert(0, '.')
          from evolution.code_evolution import run_auto_evolution
          
          token = os.environ.get('GH_MEMORY_TOKEN')
          owner = os.environ.get('ASTRO_REPO_OWNER', 'garcci')
          repo = os.environ.get('ASTRO_REPO_NAME', 'Astro')
          
          if token:
              result = run_auto_evolution(owner, repo, token)
              print(f'自动迭代结果: {result}')
          else:
              print(f'跳过自动迭代：未配置 GH_MEMORY_TOKEN (token类型={type(token)}, 长度={len(token) if token else 0})')
          "

      # ═══════════════════════════════════════════════════════════
      # 💾 数据管道持久化 — 将 log.jsonl / article_quality.jsonl 提交到仓库
      # ═══════════════════════════════════════════════════════════
      - name: Persist Data Pipeline
        if: success()
        continue-on-error: true
        run: |
          echo "💾 检查并提交数据管道文件..."
          git config --global user.email "trendradar-auto@github.com"
          git config --global user.name "TrendRadar Auto Evolution"
          
          # 添加 jsonl 数据文件（如果有变化）
          if [ -f evolution/data_pipeline/log.jsonl ] || [ -f evolution/data_pipeline/article_quality.jsonl ]; then
            git add evolution/data_pipeline/*.jsonl 2>/dev/null || true
            if ! git diff --cached --quiet; then
              git commit -m "data: 更新数据管道日志 [自动提交]" || true
              git push origin ${{ github.ref_name }} || echo "推送失败（可能无权限或无变更）"
              echo "✅ 数据管道已提交"
            else
              echo "⏭️ 数据管道无变化，跳过提交"
            fi
          else
            echo "⚠️ 数据管道文件不存在，跳过提交"
          fi
